# cloudbuild.yaml — deploy the ASHRU static website to Google Cloud Run.
#
# Submit from the repo root (NOT from website/):
#
#   cd /Users/semostudio/git/QUADFramework/QUAD/ashru-format
#   gcloud builds submit --config cloudbuild.yaml --project quadframe .
#
# What this does:
#   1. docker build -t gcr.io/quadframe/ashru-website:latest -f Dockerfile .
#      (builds the nginx image with website/ + parsers/javascript/ashru.js inside)
#   2. docker push to GCR
#   3. gcloud run deploy ashru-website (us-central1)
#
# After deploy, Cloud Run prints the service URL like:
#   https://ashru-website-xxxxxxxxxx-uc.a.run.app
# We then map ashru.dev to that URL via Cloud Run domain mapping
# (instructions in README/launch checklist after deploy).

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ashru-website:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ashru-website:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'ashru-website'
      - '--image=gcr.io/$PROJECT_ID/ashru-website:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=128Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=2'
      - '--update-env-vars=BUILD_ID=$BUILD_ID'

images:
  - 'gcr.io/$PROJECT_ID/ashru-website:latest'

# Minimal resources — this is a 7-file static site. 128Mi is plenty.
# min-instances=0 means cold-start ~1-2 sec (acceptable for a marketing site
# with low constant traffic; we eat ~$0/mo when idle vs $5-10 for warm).
options:
  logging: CLOUD_LOGGING_ONLY
