steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ashru-website:latest', '-f', 'Dockerfile', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ashru-website:latest']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'ashru-website'
      - '--image=gcr.io/$PROJECT_ID/ashru-website:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=128Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=2'
      - '--update-env-vars=BUILD_ID=$BUILD_ID'

images:
  - 'gcr.io/$PROJECT_ID/ashru-website:latest'

options:
  logging: CLOUD_LOGGING_ONLY
